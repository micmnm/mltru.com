# =============================================================================
# Woodpecker CI Pipeline for mltru.com (Astro static site)
# =============================================================================
# Branch: main - Build, push Docker image, auto-deploy to LKE
# =============================================================================

when:
  branch: [main, master]
  event: [push, manual]

variables:
  - &node_image node:22-alpine
  - &docker_image docker:24
  - &kubectl_image alpine/k8s:1.29.0

steps:
  # ---------------------------------------------------------------------------
  # Install dependencies and build
  # ---------------------------------------------------------------------------
  build:
    image: *node_image
    commands:
      - npm ci
      - npm run build

  # ---------------------------------------------------------------------------
  # Build and push Docker image
  # ---------------------------------------------------------------------------
  docker:
    image: *docker_image
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      GHCR_USER:
        from_secret: ghcr_user
      GHCR_TOKEN:
        from_secret: ghcr_token
      IMAGE_REPO: ghcr.io/micmnm/mltru-com
    commands:
      - echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
      - docker build -t "$IMAGE_REPO:$(date +%Y%m%d)-${CI_PIPELINE_NUMBER}" -t "$IMAGE_REPO:latest" --build-arg BUILD_VERSION=${CI_COMMIT_SHA:0:8} -f Dockerfile .
      - docker push "$IMAGE_REPO:$(date +%Y%m%d)-${CI_PIPELINE_NUMBER}"
      - docker push "$IMAGE_REPO:latest"
    depends_on: [build]

  # ---------------------------------------------------------------------------
  # Deploy to LKE
  # ---------------------------------------------------------------------------
  deploy:
    image: *kubectl_image
    environment:
      HOME: /tmp
      KUBECONFIG_SECRET:
        from_secret: kubeconfig
      IMAGE_REPO: ghcr.io/micmnm/mltru-com
    commands:
      - mkdir -p /tmp/.kube
      - echo "$KUBECONFIG_SECRET" > /tmp/.kube/config
      - chmod 600 /tmp/.kube/config
      - kubectl --kubeconfig=/tmp/.kube/config set image deployment/mltru-com web="$IMAGE_REPO:$(date +%Y%m%d)-${CI_PIPELINE_NUMBER}" -n mltru-com
      - kubectl --kubeconfig=/tmp/.kube/config rollout status deployment/mltru-com -n mltru-com --timeout=120s
    depends_on: [docker]

# =============================================================================
# Required Secrets (configure in Woodpecker UI)
# =============================================================================
# ghcr_user   - GitHub username for ghcr.io
# ghcr_token  - GitHub PAT with write:packages scope
# kubeconfig  - Kubeconfig for LKE cluster
# =============================================================================
