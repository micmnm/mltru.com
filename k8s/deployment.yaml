apiVersion: apps/v1
kind: Deployment
metadata:
  name: mltru-com
  namespace: mltru-com
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mltru-com
  template:
    metadata:
      labels:
        app: mltru-com
    spec:
      imagePullSecrets:
        - name: registry-credentials
      containers:
        - name: web
          image: registry.dala-triceratops.ts.net/mltru-com:latest
          ports:
            - containerPort: 80
          volumeMounts:
            - name: logs
              mountPath: /var/log/nginx
          resources:
            requests:
              memory: "32Mi"
              cpu: "10m"
            limits:
              memory: "64Mi"
              cpu: "50m"
        - name: vector
          image: timberio/vector:0.43.1-alpine
          env:
            - name: OPENOBSERVE_USER
              valueFrom:
                secretKeyRef:
                  name: openobserve-credentials
                  key: user
            - name: OPENOBSERVE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: openobserve-credentials
                  key: password
          volumeMounts:
            - name: logs
              mountPath: /var/log/nginx
              readOnly: true
            - name: vector-config
              mountPath: /etc/vector
          resources:
            requests:
              memory: "32Mi"
              cpu: "10m"
            limits:
              memory: "64Mi"
              cpu: "50m"
      volumes:
        - name: logs
          emptyDir: {}
        - name: vector-config
          configMap:
            name: vector-config
